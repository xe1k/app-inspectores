app = "app-inspecciones-chaba"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  # 1 GB: Chromium (Puppeteer) necesita memoria para generar los PDF.
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "inspecciones_data"
  destination = "/app/data"
